<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statystyki</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet"><style>
:root{--bg:#170b2d;--bg2:#241044;--card:#fff;--text:#21182f;--muted:#70647f;--primary:#7c3aed;--primary2:#a855f7;--soft:#f4e8ff;--soft2:#ead5ff;--border:#e8d5ff;--good:#166534;--warn:#92400e;--bad:#991b1b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(135deg,var(--bg),#3b0764 42%,#6d28d9);color:var(--text)}a{color:var(--primary);font-weight:700;text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1160px;margin:0 auto;padding:28px 18px}.hero{color:white;padding:34px 0 18px}.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}.nav a{color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px}.hero h1{font-size:clamp(32px,6vw,64px);line-height:.96;margin:0 0 14px}.hero p{max-width:820px;color:#f3e8ff;font-size:18px}.panel,.card{background:rgba(255,255,255,.96);border:1px solid var(--border);box-shadow:0 24px 80px rgba(24,8,48,.22);border-radius:26px}.panel{padding:18px;margin:12px 0 18px}.filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:16px;padding:12px 14px;background:white;color:var(--text);font:inherit}textarea{min-height:120px}label{font-weight:800;margin:14px 0 6px;display:block}.btn,button{border:0;border-radius:999px;padding:11px 16px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;font-weight:900;cursor:pointer}.ghost{background:var(--soft);color:var(--primary);border:1px solid var(--border)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.stat{padding:18px}.stat b{font-size:34px;color:var(--primary)}.cards{display:grid;gap:16px}.card{padding:20px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{background:var(--soft);border:1px solid var(--border);border-radius:999px;padding:6px 10px;font-size:13px;color:#4c1d95}.good{color:var(--good);background:#dcfce7;border-color:#bbf7d0}.neutral{color:#4b5563;background:#f3f4f6;border-color:#e5e7eb}.bad{color:var(--bad);background:#fee2e2;border-color:#fecaca}.warn{color:var(--warn);background:#fffbeb;border-color:#fde68a}.small{color:var(--muted);font-size:14px;line-height:1.45}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.details{display:none;margin-top:14px;border-top:1px dashed var(--border);padding-top:14px}.review{background:#faf5ff;border:1px solid var(--border);border-radius:18px;padding:14px;margin:10px 0}.review p{white-space:pre-wrap;line-height:1.55}.empty{padding:24px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden}td,th{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}.notice{background:#faf5ff;border:1px solid var(--border);border-radius:18px;padding:14px;line-height:1.5}.footer{color:#f3e8ff;margin:32px 0}@media(max-width:820px){.filters,.grid{grid-template-columns:1fr}.hero h1{font-size:38px}}
</style></head><body><div class="wrap"><header class="hero"><nav class="nav"><a href="index.html">Uczelnie i opinie</a><a href="stats.html">Statystyki</a><a href="submit.html">Dodaj opinię</a></nav><h1>Statystyki bazy</h1><p>Dane pochodzą z publicznie dostępnych informacji od uczelni, opinie pochodzą od studentów i absolwentów.</p></header><section class="grid" id="top"></section><section class="panel"><h2>Programy w bazie</h2><table id="tbl"></table></section></div><script>
function cls(s){s=String(s||'').toLowerCase();return s.includes('pozy')?'good':s.includes('nega')?'bad':'neutral'}
Promise.all([fetch('universities.json').then(r=>r.json()),fetch('reviews.json').then(r=>r.json())]).then(([u,r])=>{const us=u.universities||[],rs=r.reviews||[];const counts={pozytywna:0,neutralna:0,negatywna:0};rs.forEach(x=>counts[x.sentiment]=(counts[x.sentiment]||0)+1);const second=us.filter(x=>String(x['Czy jest II stopień na tej samej uczelni?']||'').toLowerCase().startsWith('tak')).length;document.getElementById('top').innerHTML=`<div class="panel stat"><b>${us.length}</b><br>programów</div><div class="panel stat"><b>${rs.length}</b><br>opinii</div><div class="panel stat"><b>${counts.pozytywna||0}</b><br>opinii pozytywnych</div><div class="panel stat"><b>${counts.neutralna||0}</b><br>opinii neutralnych</div><div class="panel stat"><b>${counts.negatywna||0}</b><br>opinii negatywnych</div><div class="panel stat"><b>${second}</b><br>z II stopniem</div>`;document.getElementById('tbl').innerHTML='<tr><th>Uczelnia</th><th>Kierunek</th><th>Rok oferty</th><th>Rekrutacja</th><th>Świeżo powstały?</th><th>II stopień</th></tr>'+us.map(x=>`<tr><td>${x.Uczelnia}</td><td>${x['Pełny tytuł kierunku']}</td><td>${x['Rok oferty']}</td><td>${x['Wymagane przedmioty maturalne / rekrutacja']||'—'}</td><td>${x['Czy kierunek świeżo-powstały?']||'—'}</td><td>${x['Czy jest II stopień na tej samej uczelni?']}</td></tr>`).join('')})</script></body></html>
