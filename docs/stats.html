<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statystyki</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet"><style>:root{--bg:#170b2d;--bg2:#241044;--card:#fff;--text:#21182f;--muted:#70647f;--primary:#7c3aed;--primary2:#a855f7;--soft:#f4e8ff;--soft2:#ead5ff;--border:#e8d5ff;--good:#166534;--warn:#92400e;--bad:#991b1b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(135deg,var(--bg),#3b0764 42%,#6d28d9);color:var(--text)}a{color:var(--primary);font-weight:700;text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1160px;margin:0 auto;padding:28px 18px}.hero{color:white;padding:34px 0 18px}.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}.nav a{color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px}.hero h1{font-size:clamp(32px,6vw,64px);line-height:.96;margin:0 0 14px}.hero p{max-width:860px;color:#f3e8ff;font-size:18px;line-height:1.5}.panel,.card{background:rgba(255,255,255,.96);border:1px solid var(--border);box-shadow:0 24px 80px rgba(24,8,48,.22);border-radius:26px}.panel{padding:18px;margin:12px 0 18px}.filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:16px;padding:12px 14px;background:white;color:var(--text);font:inherit}textarea{min-height:120px}label{font-weight:800;margin:14px 0 6px;display:block}.btn,button{border:0;border-radius:999px;padding:11px 16px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;font-weight:900;cursor:pointer}.ghost{background:var(--soft);color:var(--primary);border:1px solid var(--border)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.stat{padding:18px}.stat b{font-size:34px;color:var(--primary)}.cards{display:grid;gap:16px}.card{padding:20px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{background:var(--soft);border:1px solid var(--border);border-radius:999px;padding:6px 10px;font-size:13px;color:#4c1d95}.good{color:var(--good);background:#dcfce7;border-color:#bbf7d0}.neutral{color:#4b5563;background:#f3f4f6;border-color:#e5e7eb}.bad{color:var(--bad);background:#fee2e2;border-color:#fecaca}.warn{color:var(--warn);background:#fffbeb;border-color:#fde68a}.small{color:var(--muted);font-size:14px;line-height:1.45}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.details{display:none;margin-top:14px;border-top:1px dashed var(--border);padding-top:14px}.review{background:#faf5ff;border:1px solid var(--border);border-radius:18px;padding:14px;margin:10px 0}.review p{white-space:pre-wrap;line-height:1.55}.empty{padding:24px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden}td,th{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}.notice{background:#faf5ff;border:1px solid var(--border);border-radius:18px;padding:14px;line-height:1.5}.footer{color:#f3e8ff;margin:32px 0}.chart{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:180px 1fr 50px;gap:12px;align-items:center;margin:10px 0}.bar{height:24px;border-radius:999px;background:var(--soft);overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:999px}.mapbox{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:center}.map svg{width:100%;height:auto;max-height:500px}.city{fill:var(--primary);stroke:white;stroke-width:4}.citylabel{font-size:18px;font-weight:800;fill:#4c1d95}.legend{line-height:1.8}.legend b{color:var(--primary)}@media(max-width:820px){.filters,.grid,.mapbox{grid-template-columns:1fr}.hero h1{font-size:38px}.barrow{grid-template-columns:1fr}}</style></head><body><div class="wrap"><header class="hero"><nav class="nav"><a href="index.html">Uczelnie i opinie</a><a href="stats.html">Statystyki</a><a href="submit.html">Dodaj opinię</a></nav><h1>Statystyki bazy</h1><p>Dane pochodzą z publicznie dostępnych informacji od uczelni.<br>Opinie pochodzą od studentów i absolwentów.</p></header><section class="grid" id="top"></section><section class="panel"><h2>Mapa miast</h2><div class="mapbox"><div class="map"><svg viewBox="0 0 720 620" role="img" aria-label="Mapa Polski z miastami, w których są kierunki bioinformatyczne"><path d="M260 36 L405 48 L520 88 L620 180 L588 300 L620 410 L512 548 L350 585 L210 545 L105 430 L76 300 L122 165 Z" fill="#faf5ff" stroke="#7c3aed" stroke-width="8"/><circle class="city" cx="397" cy="197" r="10"/><text class="citylabel" x="414" y="202">Warszawa</text><circle class="city" cx="195" cy="235" r="10"/><text class="citylabel" x="70" y="240">Poznań</text><circle class="city" cx="365" cy="82" r="10"/><text class="citylabel" x="382" y="88">Gdańsk</text><circle class="city" cx="247" cy="420" r="10"/><text class="citylabel" x="104" y="426">Wrocław</text><circle class="city" cx="378" cy="463" r="10"/><text class="citylabel" x="394" y="468">Kraków</text><circle class="city" cx="506" cy="430" r="10"/><text class="citylabel" x="522" y="436">Lublin</text></svg></div><div class="legend" id="cityLegend"></div></div></section><section class="panel"><h2>I vs II stopień</h2><div id="degreeChart" class="chart"></div></section><section class="panel"><h2>Podsumowanie uczelni</h2><table id="tbl"></table></section></div><script>
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function isSecond(v){return String(v||'').toLowerCase().startsWith('tak')}
function isFirstDegree(u){const t=String(u['Tytuł po ukończeniu']||'').toLowerCase();return t.includes('licencjat')||t.includes('inżynier')}
function cityOf(u){const s=(u.Uczelnia+' '+u['Link do pełnej oferty']).toLowerCase(); if(s.includes('krak'))return 'Kraków'; if(s.includes('pozna'))return 'Poznań'; if(s.includes('gda'))return 'Gdańsk'; if(s.includes('wroc'))return 'Wrocław'; if(s.includes('lublin'))return 'Lublin'; if(s.includes('warsz'))return 'Warszawa'; return 'Inne'}
Promise.all([fetch('universities.json?v=6').then(r=>r.json()),fetch('reviews.json?v=6').then(r=>r.json())]).then(([u,r])=>{const us=u.universities||[],rs=r.reviews||[];const second=us.filter(x=>isSecond(x['Czy jest II stopień na tej samej uczelni?'])).length;const first=us.filter(isFirstDegree).length;document.getElementById('top').innerHTML=`<div class="panel stat"><b>${us.length}</b><br>programów</div><div class="panel stat"><b>${rs.length}</b><br>opinii</div><div class="panel stat"><b>${second}</b><br>z II stopniem</div>`;const cityCounts={};us.forEach(x=>cityCounts[cityOf(x)]=(cityCounts[cityOf(x)]||0)+1);document.getElementById('cityLegend').innerHTML='<h3>Miasta w bazie</h3>'+Object.entries(cityCounts).sort((a,b)=>a[0].localeCompare(b[0],'pl')).map(([c,n])=>`<div><b>${n}</b> — ${esc(c)}</div>`).join('');const max=Math.max(first,second,1);document.getElementById('degreeChart').innerHTML=`<div class="barrow"><strong>I stopień</strong><div class="bar"><span style="width:${Math.round(first/max*100)}%"></span></div><b>${first}</b></div><div class="barrow"><strong>II stopień</strong><div class="bar"><span style="width:${Math.round(second/max*100)}%"></span></div><b>${second}</b></div>`;document.getElementById('tbl').innerHTML='<tr><th>Uczelnia</th><th>Kierunek</th><th>Rok oferty</th><th>Rekrutacja</th><th>II stopień</th></tr>'+us.map(x=>`<tr><td>${esc(x.Uczelnia)}</td><td>${esc(x['Pełny tytuł kierunku'])}</td><td>${esc(x['Rok oferty'])}</td><td>${esc(x['Wymagane przedmioty maturalne / rekrutacja']||'—')}</td><td>${esc(x['Czy jest II stopień na tej samej uczelni?'])}</td></tr>`).join('')})</script></body></html>
